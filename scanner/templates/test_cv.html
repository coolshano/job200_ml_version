{% extends "base.html" %}

{% block content %}

<h2 style="
    text-align:center;
    margin-bottom:35px;
    color:#6a0dad;
    font-size:28px;
    font-weight:700;">
    AI Resume Generator
</h2>

<!-- 🔔 Animated Status Slider -->
<div id="statusSlider" style="
    display:none;
    position:fixed;
    top:-80px;
    left:50%;
    transform:translateX(-50%);
    background:#6a0dad;
    color:white;
    padding:14px 35px;
    border-radius:40px;
    font-weight:600;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:all 0.5s ease;
    z-index:9999;">
    <span id="sliderText">Generating Resume...</span>
</div>

<form method="POST" style="max-width:800px; margin:0 auto;" id="cvForm">
    {% csrf_token %}

    <!-- Email -->
    <div style="margin-bottom:20px;">
        <input type="email" name="email" placeholder="Your Email Address" required>
    </div>

    <!-- Name + Role -->
    <div style="display:flex; gap:20px; margin-bottom:20px;">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="text" name="role" placeholder="Target Role" required>
    </div>

    <textarea name="experience" placeholder="Experience"></textarea>
    <textarea name="education" placeholder="Education"></textarea>
    <textarea name="skills" placeholder="Skills"></textarea>
    <textarea name="certifications" placeholder="Certifications"></textarea>
    <textarea name="projects" placeholder="Projects"></textarea>
    <textarea name="achievements" placeholder="Achievements"></textarea>
    <textarea name="job_description" placeholder="Paste Job Description Here" required></textarea>

    <div style="text-align:center; margin-top:30px;">
        <button type="submit" class="primary-btn" id="generateBtn">
            Generate & Email Resume
        </button>
    </div>
</form>

<!-- 🔄 Loading Overlay -->
<div id="loadingOverlay" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(4px);
    justify-content:center;
    align-items:center;
    z-index:9998;">

    <div style="
        background:white;
        padding:40px 50px;
        border-radius:15px;
        text-align:center;
        width:400px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);">

        <h3 style="color:#6a0dad; margin-bottom:20px;">
            Generating Your AI Resume...
        </h3>

        <div style="
            width:100%;
            background:#eee;
            border-radius:20px;
            overflow:hidden;
            height:12px;">
            <div id="progressBar" style="
                width:0%;
                height:100%;
                background:linear-gradient(90deg,#6a0dad,#8a2be2);
                transition:width 0.3s ease;"></div>
        </div>

        <p style="margin-top:15px; font-size:14px; color:#666;">
            You will receive your sample resume within 10 mins
        </p>
    </div>
</div>

<style>
form input,
form textarea {
    width:100%;
    padding:12px 15px;
    margin-bottom:18px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:14px;
    transition:all 0.2s ease;
}

form textarea {
    min-height:90px;
    resize:vertical;
}

form input:focus,
form textarea:focus {
    outline:none;
    border-color:#6a0dad;
    box-shadow:0 0 0 3px rgba(106,13,173,0.15);
}

.primary-btn {
    background:#6a0dad;
    color:white;
    padding:12px 35px;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
    transition:all 0.2s ease;
}

.primary-btn:hover {
    background:#4b0082;
    transform:translateY(-2px);
}
</style>

<script>
const form = document.getElementById("cvForm");

if (form) {
    form.addEventListener("submit", function(e) {

        // 🚨 STOP normal form submission
        e.preventDefault();

        const overlay = document.getElementById("loadingOverlay");
        const progressBar = document.getElementById("progressBar");
        const button = document.getElementById("generateBtn");
        const slider = document.getElementById("statusSlider");
        const sliderText = document.getElementById("sliderText");

        // Show overlay
        overlay.style.display = "flex";

        // Show slider
        slider.style.display = "block";
        setTimeout(() => {
            slider.style.top = "20px";
        }, 100);

        button.disabled = true;
        button.innerText = "Generating...";

        let progress = 0;

        const interval = setInterval(() => {
            progress += 1;
            if (progress <= 95) {
                progressBar.style.width = progress + "%";
            }
        }, 300);

        // Change message at 15 seconds
        setTimeout(() => {
            sliderText.innerText = "Resume Sent to Email ✅";
            slider.style.background = "#2e7d32";
        }, 15000);

        // After 30 seconds → submit form for real
        setTimeout(() => {
            clearInterval(interval);
            progressBar.style.width = "100%";
            form.submit();  // 🔥 NOW actually submit
        }, 30000);
    });
}
</script>

{% endblock %}
