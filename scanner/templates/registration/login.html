{% extends "base.html" %}
{% block content %}

<h1 class="login-title">Recruiter Login</h1>
<p class="login-subtitle">
    Secure access to your ATS dashboard
</p>

<form method="POST" class="login-form">
    {% csrf_token %}

    <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
    </div>

    <button type="submit" class="login-btn">
        Login
    </button>
</form>

<style>
.login-title {
    text-align: center;
    color: #6a0dad;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 5px;
}

.login-subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 30px;
}

.login-form {
    max-width: 420px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    font-weight: 600;
    margin-bottom: 6px;
}

.form-group input {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 15px;
    transition: border 0.2s, box-shadow 0.2s;
}

.form-group input:focus {
    outline: none;
    border-color: #6a0dad;
    box-shadow: 0 0 0 3px rgba(106, 13, 173, 0.15);
}

.login-btn {
    background: #6a0dad;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(106, 13, 173, 0.35);
}
</style>

{% endblock %}
